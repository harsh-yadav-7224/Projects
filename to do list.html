<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colorful To-Do List</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        width: 350px;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        text-align: center;
    }

    h1 {
        color: #333;
        margin-bottom: 20px;
    }

    .input-section {
        display: flex;
        gap: 10px;
    }

    input {
        flex: 1;
        padding: 12px;
        border: 2px solid #4facfe;
        border-radius: 8px;
        outline: none;
        font-size: 16px;
    }

    button {
        padding: 12px 18px;
        background: #4facfe;
        border: none;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
    }

    button:hover {
        background: #007bff;
    }

    ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
    }

    li {
        background: #f1f1f1;
        padding: 12px;
        margin-top: 10px;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: 0.3s;
    }

    li:hover {
        transform: scale(1.02);
        background: #e3f2fd;
    }

    .delete-btn {
        background: red;
        border: none;
        color: white;
        padding: 6px 10px;
        border-radius: 5px;
        cursor: pointer;
    }

    .delete-btn:hover {
        background: darkred;
    }
</style>
</head>

<body>

<div class="container">
    <h1>📝 To-Do List</h1>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter your task">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
function addTask() {
    let input = document.getElementById("taskInput");
    let task = input.value.trim();

    if(task === "") {
        alert("Please enter a task");
        return;
    }

    let li = document.createElement("li");

    li.innerHTML = `
        ${task}
        <button class="delete-btn" onclick="removeTask(this)">X</button>
    `;

    document.getElementById("taskList").appendChild(li);

    input.value = "";
}

function removeTask(button) {
    button.parentElement.remove();
}
</script>

</body>
</html>
